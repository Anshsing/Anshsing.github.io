<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <!-- 1. Tells browsers to redirect instantly to the subfolder -->
    <meta http-equiv="refresh" content="0; url=https://custom_domain/portfolio/">
    <script type="text/javascript">
        // 2. JavaScript fallback redirect just in case
        window.location.href = "https://anshsingh.me/portfolio/"
    </script>
</head>
<body>
    <p>If you are not redirected automatically, follow this <a href="https://anshsingh.me/portfolio/">link to my portfolio</a>.</p>
</body>
</html>
